<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>投稿作成</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input, textarea {
            width: 300px;
            margin: 10px;
            padding: 8px;
        }

        textarea {
            height: 100px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>

<body>

<h2>投稿作成</h2>

<input id="title" placeholder="タイトル"><br>
<textarea id="content" placeholder="内容"></textarea><br>

<button onclick="write()">投稿</button>

<script>
// 投稿処理
function write(){

    const t = document.getElementById("title").value;
    const c = document.getElementById("content").value;

    // 入力チェック
    if(!t || !c){
        alert("タイトルと内容を入力してください");
        return;
    }

    fetch("/board/write", {
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:`title=${encodeURIComponent(t)}&content=${encodeURIComponent(c)}`
    })
    .then(res => res.text())
    .then(data => {

        if(data === "OK"){
            alert("投稿完了");
            location.href="/board";
        }
        else if(data === "LOGIN_REQUIRED"){
            alert("ログインが必要です");
            location.href="/login";
        }
        else{
            alert("エラーが発生しました");
        }
    })
    .catch(() => {
        alert("通信エラー");
    });
}
</script>

</body>
</html>
