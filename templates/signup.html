<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>会員登録</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }

        input {
            width: 250px;
            margin: 10px;
            padding: 8px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        #msg {
            color: red;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h2>会員登録</h2>

<input id="u" placeholder="ユーザー名"><br>
<input id="p" type="password" placeholder="パスワード"><br>

<button onclick="signup()">登録</button>

<p id="msg"></p>

<a href="/login">ログインへ戻る</a>

<script>
// 会員登録処理
function signup(){

    const u = document.getElementById("u").value.trim();
    const p = document.getElementById("p").value.trim();
    const msg = document.getElementById("msg");

    // 入力チェック
    if(!u || !p){
        msg.innerText = "ユーザー名とパスワードを入力してください";
        return;
    }

    fetch("/user/signup", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(res => res.text())
    .then(data => {

        if(data === "OK"){
            alert("登録完了");
            location.href = "/login";
        }
        else if(data === "DUPLICATE"){
            msg.innerText = "既に存在するユーザーです";
        }
        else{
            msg.innerText = "エラーが発生しました";
        }
    })
    .catch(() => {
        msg.innerText = "通信エラーが発生しました";
    });
}
</script>

</body>
</html>
