<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掲示板アプリ</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }
        .menu {
            margin: 20px;
        }
        a {
            margin: 10px;
        }
    </style>
</head>

<body>

<h1>掲示板アプリ</h1>

<div class="menu">
    <a href="/login">ログイン</a>
    <a href="/board">掲示板</a>
</div>

<div id="user">読み込み中...</div>

<!-- JS를 Thymeleaf-safe하게 -->
<script th:inline="javascript">
    fetch("/user/me")
        .then(function(res) { return res.text(); })
        .then(function(user) {

            var userDiv = document.getElementById("user");

            if(user && user !== "null"){
                userDiv.innerHTML =
                    "<p>" + user + " さんログイン中</p>" +
                    "<form action='/user/logout' method='post'>" +
                    "<button>ログアウト</button>" +
                    "</form>";
            } else {
                userDiv.innerHTML =
                    "<p>未ログイン</p>" +
                    "<a href='/login'>ログインはこちら</a>";
            }
        })
        .catch(function() {
            document.getElementById("user").innerText = "通信エラー";
        });
</script>

</body>
</html>
