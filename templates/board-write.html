<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>投稿作成</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input, textarea {
            width: 300px;
            margin: 10px;
            padding: 8px;
            font-size: 14px;
        }

        textarea {
            height: 120px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>投稿作成</h2>

<input id="title" placeholder="タイトル"><br>
<textarea id="content" placeholder="内容"></textarea><br>

<button onclick="write()">投稿</button>

<script>
// 投稿処理
function write(){

    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();

    // 入力チェック
    if(!title || !content){
        alert("タイトルと内容を入力してください");
        return;
    }

    fetch("/board/write", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `title=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}`
    })
    .then(res => res.text())
    .then(data => {

        if(data === "OK"){
            alert("投稿完了");
            location.href = "/board";
        }
        else if(data === "LOGIN_REQUIRED"){
            alert("ログインが必要です");
            location.href = "/login";
        }
        else{
            alert("エラーが発生しました");
        }
    })
    .catch(() => {
        alert("通信エラーが発生しました");
    });
}
</script>

</body>
</html>
