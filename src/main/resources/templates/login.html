<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }

        input {
            width: 250px;
            margin: 10px;
            padding: 8px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        #msg {
            color: red;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h2>ログイン</h2>

<input id="u" placeholder="ユーザー名"><br>
<input id="p" type="password" placeholder="パスワード"><br>

<button onclick="login()">ログイン</button>

<p id="msg"></p>

<a href="/signup">新規登録</a>

<script>
function login(){

    var u = document.getElementById("u").value.trim();
    var p = document.getElementById("p").value.trim();
    var msg = document.getElementById("msg");

    msg.innerText = "";

    if(!u || !p){
        msg.innerText = "ユーザー名とパスワードを入力してください";
        return;
    }

    fetch("/user/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "u=" + encodeURIComponent(u) + "&p=" + encodeURIComponent(p)
    })
    .then(function(res){
        if(!res.ok){
        throw new Error();
        }
        return res.text();
    })
    .then(function(data){

        if(data === "OK"){
            alert("ログイン成功");
            location.href = "/";
        } else {
            msg.innerText = "ユーザー名またはパスワードが間違っています";
        }
    })
    .catch(function(){
        msg.innerText = "通信エラーが発生しました";
    });
}
</script>

</body>
</html>
