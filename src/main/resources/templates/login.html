<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }

        input {
            width: 250px;
            margin: 10px;
            padding: 8px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        #msg {
            color: red;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h2>ログイン</h2>

<input id="u" placeholder="ユーザー名"><br>
<input id="p" type="password" placeholder="パスワード"><br>

<button onclick="login()">ログイン</button>
<button onclick="goMain()">Mainに戻る</button>

<p id="msg"></p>

<a href="/signup">新規登録</a>

<script>
// ログイン処理をする関数です
function login(){

    var u = document.getElementById("u").value.trim();
    var p = document.getElementById("p").value.trim();
    var msg = document.getElementById("msg");

    // 先にメッセージを空にします
    msg.innerText = "";

    // 入力が空の場合はエラーメッセージを表示します
    if(!u || !p){
        msg.innerText = "ユーザー名とパスワードを入力してください";
        return;
    }

    fetch("/user/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "u=" + encodeURIComponent(u) + "&p=" + encodeURIComponent(p)
    })
    .then(function(res){
        if(!res.ok){
            throw new Error();
        }
        return res.text();
    })
    .then(function(data){

        // ログイン成功時はメイン画面に移動します
        if(data === "OK"){
            alert("ログイン成功");
            location.href = "/";
        } else {
            msg.innerText = "ユーザー名またはパスワードが間違っています";
        }
    })
    .catch(function(){
        // 通信に失敗した場合のメッセージです
        msg.innerText = "通信エラーが発生しました";
    });
}

// メイン画面に戻る関数です
function goMain(){
    location.href = "/";
}

</script>

</body>
</html>
