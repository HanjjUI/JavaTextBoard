<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
            background: #f5f5f5;
        }

        .login-box {
            width: 360px;
            margin: 0 auto;
            padding: 28px 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        input {
            width: 100%;
            max-width: 280px;
            margin: 10px auto;
            padding: 10px 12px;
            box-sizing: border-box;
            display: block;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            margin: 6px 4px 0;
        }

        #msg {
            color: red;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>ログイン</h2>

    <input id="u" placeholder="ユーザー名"><br>
    <input id="p" type="password" placeholder="パスワード"><br>

    <button onclick="login()">ログイン</button>
    <button onclick="goMain()">Mainに戻る</button>

    <p id="msg"></p>

    <a href="/signup">新規登録</a>
</div>

<script>
function login(){

    var u = document.getElementById("u").value.trim();
    var p = document.getElementById("p").value.trim();
    var msg = document.getElementById("msg");

    msg.innerText = "";

    if(!u || !p){
        msg.innerText = "ユーザー名とパスワードを入力してください";
        return;
    }

    fetch("/user/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "u=" + encodeURIComponent(u) + "&p=" + encodeURIComponent(p)
    })
    .then(function(res){
        if(!res.ok){
            throw new Error();
        }
        return res.text();
    })
    .then(function(data){

        if(data === "OK"){
            alert("ログイン成功");
            location.href = "/";
        } else {
            msg.innerText = "ユーザー名またはパスワードが間違っています";
        }
    })
    .catch(function(){
        msg.innerText = "通信エラーが発生しました";
    });
}

function goMain(){
    location.href = "/";
}

</script>

</body>
</html>
