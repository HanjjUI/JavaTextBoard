<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>投稿作成</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    width: 900px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* ヘッダー部分です */
.header {
    display: flex;
    align-items: center;
    padding: 10px;
    height: 60px;
    border-bottom: 1px solid #ddd;
}

.header button {
    height: 100%;
    padding: 0 15px;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
}

/* 入力エリアです */
.content {
    flex: 1;
    padding: 30px;
    text-align: left;
}

/* 入力フォームのデザインです */
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #ccc;
}

textarea {
    height: 200px;
}

/* 下のボタンエリアです */
.footer {
    padding: 10px;
    border-top: 1px solid #ddd;
    text-align: right;
}

button {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- ヘッダーです -->
    <div class="header">
        <button onclick="location.href='/'">Main</button>
        <div class="title">投稿作成</div>
        <div></div>
    </div>

    <!-- 投稿入力エリアです -->
    <div class="content">

        <label>タイトル</label>
        <input id="title">

        <label>内容</label>
        <textarea id="content"></textarea>

    </div>

    <!-- 投稿ボタンのエリアです -->
    <div class="footer">
        <button onclick="submitPost()">投稿</button>
    </div>

</div>

<script>
// 投稿内容をサーバーに送る関数です
function submitPost(){

    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    fetch("/board/write", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: title,
            content: content
        })
    })
    .then(res => res.text())
    .then(() => {
        alert("投稿完了");
        location.href = "/index";
    });
}
</script>

</body>
</html>
