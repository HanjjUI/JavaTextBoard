<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>投稿作成</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

.container {
    width: 900px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    align-items: center;
    padding: 10px;
    height: 60px;
    border-bottom: 1px solid #ddd;
}

.header button {
    height: 100%;
    padding: 0 15px;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
}

.content {
    flex: 1;
    padding: 30px;
    text-align: left;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: 1px solid #ccc;
}

textarea {
    height: 200px;
}

.footer {
    padding: 10px;
    border-top: 1px solid #ddd;
    text-align: right;
}

button {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <button onclick="location.href='/'">Main</button>
        <div class="title" id="pageTitle">投稿作成</div>
        <div></div>
    </div>

    <div class="content">
        <label>タイトル</label>
        <input id="title">

        <label>内容</label>
        <textarea id="content"></textarea>
    </div>

    <div class="footer">
        <button id="submitBtn" onclick="submitPost()">投稿</button>
    </div>

</div>

<script>
const params = new URLSearchParams(location.search);
const editId = params.get("id");

if(editId){
    document.getElementById("pageTitle").innerText = "投稿編集";
    document.getElementById("submitBtn").innerText = "保存";

    fetch(`/board/${editId}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("title").value = data.title || "";
            document.getElementById("content").value = data.content || "";
        })
        .catch(() => {
            alert("投稿データの取得に失敗しました");
            location.href = "/index";
        });
}

function submitPost(){

    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    const method = editId ? "PUT" : "POST";
    const url = editId ? `/board/${editId}` : "/board/write";

    fetch(url, {
        method: method,
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            title: title,
            content: content
        })
    })
    .then(res => res.text())
    .then(data => {
        if(data === "OK"){
            alert(editId ? "修正完了" : "投稿完了");
            location.href = "/index";
            return;
        }

        if(data === "LOGIN_REQUIRED"){
            alert("ログインが必要です");
            location.href = "/login";
            return;
        }

        alert(editId ? "修正に失敗しました" : "投稿に失敗しました");
    })
    .catch(() => {
        alert("通信エラーが発生しました");
    });
}
</script>

</body>
</html>
