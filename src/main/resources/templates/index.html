<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #e9eef2;
    margin: 0;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 메인 */
.container {
    width: 420px;
    height: 90vh;
    background: white;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);

    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ===== 상단 ===== */
.header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 로그인 입력창 */
.login-input {
    display: flex;
    gap: 5px;
}

.login-input input {
    width: 90px;
    padding: 5px;
    font-size: 12px;
}

/* 제목 */
.title {
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    margin-top: 10px;
}

/* ===== 검색 ===== */
.search {
    margin-top: 10px;
    display: flex;
    gap: 5px;
}

.search input {
    flex: 1;
    padding: 6px;
    font-size: 12px;
}

.search button {
    padding: 6px;
}

/* ===== 게시판 ===== */
.content {
    flex: 1;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border-bottom: 1px solid #eee;
    padding: 8px;
    text-align: center;
    font-size: 13px;
}

.empty {
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: gray;
}

/* ===== 하단 ===== */
.footer {
    padding: 10px;
    border-top: 1px solid #ddd;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.pagination {
    display: flex;
    gap: 5px;
}

.write-btn {
    padding: 6px 10px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">

        <div class="top-row">
            <button onclick="location.href='/index'">Main</button>

            <!-- 🔥 로그인 입력창 -->
            <div class="login-input">
                <input id="username" placeholder="ID">
                <input id="password" type="password" placeholder="PW">
            </div>
        </div>

        <div class="title">今日の出来事は</div>

        <!-- 검색 + 로그인 버튼 -->
        <div class="search">
            <input placeholder="番号">
            <input placeholder="タイトル">
            <input placeholder="作成者">

            <button>検索</button>

            <!-- 🔥 버튼 이동 -->
            <button onclick="login()">ログイン</button>
            <button onclick="location.href='/signup'">会員登録</button>
        </div>

    </div>

    <!-- 게시판 -->
    <div class="content">
        <table>
            <thead>
                <tr>
                    <th>番号</th>
                    <th>タイトル</th>
                    <th>作成者</th>
                    <th>日付</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>

        <div class="empty" id="emptyMessage">
            投稿がありません
        </div>
    </div>

    <!-- 하단 -->
    <div class="footer">
        <div class="pagination">
            <button>前へ</button>
            <button>次へ</button>
        </div>

        <button class="write-btn">投稿</button>
    </div>

</div>

<script>
// 🔥 로그인 기능
function login(){
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "username=" + encodeURIComponent(u) + "&password=" + encodeURIComponent(p)
    })
    .then(res => res.text())
    .then(result => {
        if(result === "ok"){
            alert("ログイン成功");
            location.reload();
        } else {
            alert("ログイン失敗");
        }
    });
}
</script>

</body>
</html>
