<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

button {
    cursor: pointer;
    border: none;
    background: #333;
    color: white;
    transition: 0.2s;
    padding: 8px 12px;
    border-radius: 5px;
}

button:hover {
    background: #555;
}

.container {
    width: 900px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}

/* header */
.header {
    display: flex;
    align-items: center;
    padding: 10px;
    height: 60px;
    border-bottom: 1px solid #ddd;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
}

.auth {
    display: flex;
    gap: 10px;
}

/* content */
.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* table */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

/* modal */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:white;
    padding:20px;
    border-radius:10px;
    width:350px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <button onclick="location.reload()">Main</button>
    <div class="title">本日の出来事は</div>
    <div class="auth" id="authArea"></div>
</div>

<div class="content">
    <table>
        <thead>
        <tr>
            <th>番号</th>
            <th>タイトル</th>
            <th>作成者</th>
            <th>作成日</th>
            <th>閲覧数</th>
        </tr>
        </thead>
        <tbody id="boardBody"></tbody>
    </table>
</div>

<div style="padding:10px; text-align:right;">
    <button onclick="goWrite()">投稿</button>
</div>

</div>

<!-- 상세 모달 -->
<div class="modal" id="detailModal">
    <div class="modal-box">

        <h3 id="detailTitle"></h3>
        <p id="detailAuthor"></p>
        <hr>
        <p id="detailContent"></p>

        <!-- 🔥 핵심: 수정/삭제 -->
        <div id="detailActions" style="margin-top:15px; display:none;">
            <button onclick="editPost()">修正</button>
            <button onclick="deletePost()" style="background:crimson;">削除</button>
        </div>

        <br>
        <button onclick="closeDetail()">閉じる</button>
    </div>
</div>

<script>
let currentUser = null;
let currentPostId = null;
let currentPostAuthor = null;

/* 로그인 상태 */
function checkLogin(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {
        if(user !== "null"){
            currentUser = user;
            document.getElementById("authArea").innerHTML =
                `<span>${user}</span>
                 <button onclick="logout()">ログアウト</button>`;
        } else {
            document.getElementById("authArea").innerHTML =
                `<button onclick="alert('ログイン必要')">ログイン</button>`;
        }
    });
}

/* 로그아웃 */
function logout(){
    fetch("/user/logout",{method:"POST"})
    .then(()=>location.reload());
}

/* 글쓰기 */
function goWrite(){
    if(!currentUser){
        alert("ログインしてください");
        return;
    }
    location.href="/board/write";
}

/* 게시글 목록 */
function loadBoard(){
    fetch("/board/list")
    .then(res=>res.json())
    .then(data=>{
        const body=document.getElementById("boardBody");
        body.innerHTML="";

        data.forEach((b,i)=>{
            body.innerHTML+=`
            <tr>
                <td>${i+1}</td>
                <td><a href="#" onclick="viewDetail(${b.id})">${b.title}</a></td>
                <td>${b.author}</td>
                <td>${b.createdAt ? b.createdAt.substring(0,16).replace('T',' ') : ''}</td>
                <td>${b.viewCount}</td>
            </tr>`;
        });
    });
}

/* 상세보기 */
function viewDetail(id){
    fetch(`/board/${id}`)
    .then(res=>res.json())
    .then(data=>{
        currentPostId = data.id;
        currentPostAuthor = data.author;

        document.getElementById("detailTitle").innerText = data.title;
        document.getElementById("detailAuthor").innerText = "작성자: "+data.author;
        document.getElementById("detailContent").innerText = data.content;

        // 🔥 권한 체크
        if(currentUser === data.author){
            document.getElementById("detailActions").style.display="block";
        } else {
            document.getElementById("detailActions").style.display="none";
        }

        document.getElementById("detailModal").style.display="flex";
    });
}

/* 닫기 */
function closeDetail(){
    document.getElementById("detailModal").style.display="none";
}

/* 수정 */
function editPost(){
    location.href = `/board/edit/${currentPostId}`;
}

/* 삭제 */
function deletePost(){
    if(!confirm("本当に削除しますか？")) return;

    fetch(`/board/delete/${currentPostId}`,{
        method:"POST"
    })
    .then(res=>res.text())
    .then(result=>{
        if(result==="OK"){
            alert("削除完了");
            closeDetail();
            loadBoard();
        }else{
            alert("削除失敗");
        }
    });
}

/* 초기 실행 */
window.onload=function(){
    checkLogin();
    loadBoard();
}
</script>

</body>
</html>
