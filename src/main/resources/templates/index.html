<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
/* ===== 기본 ===== */
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

button {
    cursor: pointer;
    box-sizing: border-box;
    border: none;
    background: #333;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #555;
}

/* ===== 컨테이너 ===== */
.container {
    width: 900px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* ===== 상단 ===== */
.header {
    display: flex;
    align-items: center;
    padding: 10px;
    height: 60px;
    border-bottom: 1px solid #ddd;
}

.header button {
    height: 100%;
    padding: 0 15px;
    border-radius: 5px;
}

.main-btn {
    width: 80px;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
    font-size: 18px;

    display: flex;
    align-items: center;
    justify-content: center;
}

.auth {
    display: flex;
    gap: 10px;
    height: 100%;
}

/* ===== 검색 ===== */
.search {
    display: flex;
    gap: 10px;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.search input {
    padding: 5px;
    border: 1px solid #ccc;
}

.title-input {
    width: 250px;
}

/* ===== 게시판 ===== */
.content {
    flex: 1;
    overflow-y: auto;
}

/* 테이블 */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #eee;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* hover 효과 */
tbody tr:hover {
    background: #f9f9f9;
}

/* 줄무늬 */
tbody tr:nth-child(even) {
    background: #fafafa;
}

/* 빈 상태 */
.empty {
    text-align: center;
    margin-top: 200px;
    color: #888;
}

/* ===== 하단 ===== */
.footer {
    padding: 10px;
    display: flex;
    align-items: center;
    border-top: 1px solid #ddd;
}

.pagination {
    display: flex;
    gap: 10px;
}

.page-info {
    flex: 1;
    text-align: center;
}

.write-btn {
    width: 100px;
    border-radius: 5px;
}

/* ===== 모달 ===== */
.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);

    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.modal input {
    width: 100%;
    margin: 10px 0;
    padding: 8px;
}

/* 닫기 버튼 */
.close {
    margin-top: 10px;
    background: crimson;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">

        <button class="main-btn" onclick="location.href='/'">Main</button>

        <div class="title">本日の出来事は</div>

        <div class="auth">
            <button onclick="openLogin()">ログイン</button>
            <button onclick="openSignup()">会員登録</button>
        </div>

    </div>

    <!-- 검색 -->
    <div class="search">
        <span>番号</span>
        <input>

        <span>タイトル</span>
        <input class="title-input">

        <span>作成者</span>
        <input>

        <button>検索</button>
    </div>

    <!-- 게시판 -->
    <div class="content">

        <table>
            <thead>
                <tr>
                    <th>番号</th>
                    <th>タイトル</th>
                    <th>作成者</th>
                    <th>作成日</th>
                    <th>閲覧数</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>

        <div class="empty">投稿がありません</div>

    </div>

    <!-- 하단 -->
    <div class="footer">

        <div class="pagination">
            <button>前へ</button>
            <button>次へ</button>
        </div>

        <div class="page-info">
            1 / 1 ページ
        </div>

        <button class="write-btn" onclick="goWrite()">投稿</button>

    </div>

</div>

<!-- 로그인 모달 -->
<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>ログイン</h3>
        <input placeholder="ユーザー名">
        <input type="password" placeholder="パスワード">
        <button>ログイン</button>
        <button class="close" onclick="closeModal()">閉じる</button>
    </div>
</div>

<!-- 회원가입 모달 -->
<div class="modal" id="signupModal">
    <div class="modal-box">
        <h3>会員登録</h3>
        <input placeholder="ユーザー名">
        <input type="password" placeholder="パスワード">
        <button>登録</button>
        <button class="close" onclick="closeModal()">閉じる</button>
    </div>
</div>

<script>
function openLogin(){
    document.getElementById("loginModal").style.display = "flex";
}

function openSignup(){
    document.getElementById("signupModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("signupModal").style.display = "none";
}

function goWrite(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {
        if(user === "null"){
            alert("ログインしてください");
            openLogin();
        } else {
            location.href = "/board/write";
        }
    });
}
</script>

</body>
</html>
