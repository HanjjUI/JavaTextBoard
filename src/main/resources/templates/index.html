<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掲示板アプリ</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #f4f4f4 0%, #ececec 100%);
    margin: 0;
    color: #222;
}

button {
    cursor: pointer;
    border: none;
    background: #2f2f2f;
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s ease;
}

button:hover {
    background: #111;
}

.container {
    width: 900px;
    max-width: 94%;
    margin: 36px auto;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    display: flex;
    align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid #e5e5e5;
    background: #fafafa;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.5px;
}

#authArea {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 140px;
    justify-content: flex-end;
    font-size: 14px;
}

.content {
    padding: 10px 22px 24px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
}

th, td {
    padding: 14px 10px;
    border-bottom: 1px solid #ececec;
    text-align: center;
    font-size: 14px;
}

th {
    background: #fafafa;
    font-weight: 700;
}

.title-link {
    cursor: pointer;
    color: #222;
    font-weight: 500;
    transition: color 0.2s ease;
}

.title-link:hover {
    color: #0f62fe;
    text-decoration: underline;
}

.footer {
    padding: 18px 22px 22px;
    text-align: right;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 16px;
    box-sizing: border-box;
}

.modal-box {
    background: white;
    padding: 24px;
    border-radius: 14px;
    width: 360px;
    max-width: 100%;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
}

.modal-box h3 {
    margin-top: 0;
    margin-bottom: 14px;
    font-size: 20px;
}

.modal-box p {
    line-height: 1.6;
    margin-bottom: 18px;
    word-break: break-word;
}

.detail-meta {
    margin-bottom: 16px;
    padding: 12px 14px;
    background: #f8f8f8;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
}

.detail-meta div {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 1px solid #ececec;
    padding: 4px 0;
}

.detail-meta div:last-child {
    border-bottom: none;
}

.detail-label {
    font-weight: 700;
    color: #444;
}

.detail-value {
    color: #222;
    text-align: right;
    word-break: break-word;
}

.detail-content {
    white-space: pre-wrap;
    background: #fff;
    border: 1px solid #ececec;
    border-radius: 10px;
    padding: 14px;
    min-height: 80px;
}

.modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px 12px;
    box-sizing: border-box;
    border: 1px solid #d6d6d6;
    border-radius: 8px;
    font-size: 14px;
}

@media (max-width: 768px) {
    .header {
        gap: 10px;
        flex-wrap: wrap;
    }

    .title {
        order: -1;
        width: 100%;
        text-align: center;
    }

    #authArea {
        min-width: auto;
    }

    th, td {
        font-size: 13px;
        padding: 10px 6px;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <button id="mainBtn">Main</button>
        <div class="title">掲示板一覧</div>
        <div id="authArea"></div>
    </div>

    <div class="content">
        <table>
            <thead>
                <tr>
                    <th>番号</th>
                    <th>タイトル</th>
                    <th>作成者</th>
                    <th>日付</th>
                    <th>閲覧数</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <button id="writeBtn">投稿</button>
    </div>
</div>

<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>ログイン</h3>
        <input id="li-username" placeholder="ユーザー名">
        <input id="li-password" type="password" placeholder="パスワード">
        <div class="modal-actions">
            <button id="loginBtn">ログイン</button>
        </div>
    </div>
</div>

<div class="modal" id="detailModal">
    <div class="modal-box">
        <h3 id="detailTitle"></h3>
        <div class="detail-meta">
            <div><span class="detail-label">番号</span><span class="detail-value" id="detailId"></span></div>
            <div><span class="detail-label">作成者</span><span class="detail-value" id="detailAuthor"></span></div>
            <div><span class="detail-label">作成日時</span><span class="detail-value" id="detailCreatedAt"></span></div>
            <div><span class="detail-label">閲覧数</span><span class="detail-value" id="detailViewCount"></span></div>
        </div>
        <div class="detail-content" id="detailContent"></div>
        <div class="modal-actions">
            <button id="editBtn">編集</button>
            <button id="deleteBtn">削除</button>
        </div>
    </div>
</div>

<script>
function escapeHTML(str) {
    const value = str || "";
    return value.replace(/[&<>"']/g, function(m) {
        return {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
        }[m];
    });
}

async function request(url, options) {
    try {
        const res = await fetch(url, options || {});
        if (!res.ok) {
            throw new Error("Server Error");
        }
        return res;
    } catch (e) {
        alert("通信エラー");
        throw e;
    }
}

let currentUser = null;
let currentPostId = null;

const API = {
    async getUser() {
        const res = await request("/user/me");
        return await res.text();
    },

    async login(u, p) {
        const res = await request("/user/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "u=" + encodeURIComponent(u) + "&p=" + encodeURIComponent(p)
        });
        return await res.text();
    },

    async list() {
        const res = await request("/board/list");
        return await res.json();
    },

    async detail(id) {
        const res = await request("/board/" + id);
        return await res.json();
    },

    async delete(id) {
        const res = await request("/board/" + id, {
            method: "DELETE"
        });
        return await res.text();
    }
};

async function renderAuth() {
    currentUser = await API.getUser();
    const area = document.getElementById("authArea");

    if (currentUser !== "null") {
        area.innerHTML =
            "<span>" + escapeHTML(currentUser) + "</span>" +
            "<button id='logoutBtn'>ログアウト</button>";

        document.getElementById("logoutBtn").addEventListener("click", logout);
    } else {
        area.innerHTML = "<button id='openLoginBtn'>ログイン</button>";
        document.getElementById("openLoginBtn").addEventListener("click", function() {
            openModal("loginModal");
        });
    }
}

async function renderBoard() {
    const data = await API.list();
    const body = document.getElementById("boardBody");

    if (data.length === 0) {
        body.innerHTML = "<tr><td colspan='5'>投稿がありません</td></tr>";
        return;
    }

    const rows = data.map(function(b, i) {
        const createdAt = b.createdAt ? b.createdAt.replace("T", " ").substring(0, 16) : "";
        return (
            "<tr>" +
            "<td>" + (i + 1) + "</td>" +
            "<td class='title-link' data-id='" + b.id + "'>" + escapeHTML(b.title) + "</td>" +
            "<td>" + escapeHTML(b.author) + "</td>" +
            "<td>" + createdAt + "</td>" +
            "<td>" + b.viewCount + "</td>" +
            "</tr>"
        );
    }).join("");

    body.innerHTML = rows;

    document.querySelectorAll(".title-link").forEach(function(el) {
        el.addEventListener("click", function(e) {
            viewDetail(e.target.dataset.id);
        });
    });
}

document.getElementById("loginBtn").addEventListener("click", async function() {
    const u = document.getElementById("li-username").value;
    const p = document.getElementById("li-password").value;

    const res = await API.login(u, p);

    if (res === "OK") {
        closeModal();
        await renderAuth();
    } else {
        alert("ログイン失敗");
    }
});

function logout() {
    fetch("/user/logout", { method: "POST" })
        .then(function() {
            location.reload();
        });
}

async function viewDetail(id) {
    currentPostId = id;

    const data = await API.detail(id);
    const createdAt = data.createdAt ? data.createdAt.replace("T", " ").substring(0, 16) : "";

    document.getElementById("detailTitle").innerText = data.title;
    document.getElementById("detailContent").innerText = data.content;
    document.getElementById("detailId").innerText = data.id;
    document.getElementById("detailAuthor").innerText = data.author;
    document.getElementById("detailCreatedAt").innerText = createdAt;
    document.getElementById("detailViewCount").innerText = data.viewCount;

    const canManage = currentUser !== "null" && currentUser === data.author;
    document.getElementById("editBtn").style.display = canManage ? "inline-block" : "none";
    document.getElementById("deleteBtn").style.display = canManage ? "inline-block" : "none";

    openModal("detailModal");
}

document.getElementById("editBtn").addEventListener("click", function() {
    location.href = "/board/write?id=" + currentPostId;
});

document.getElementById("deleteBtn").addEventListener("click", async function() {
    if (!confirm("削除しますか？")) {
        return;
    }

    const res = await API.delete(currentPostId);

    if (res === "OK") {
        closeModal();
        await renderBoard();
        return;
    }

    if (res === "LOGIN_REQUIRED") {
        alert("ログインが必要です");
        location.href = "/login";
        return;
    }

    alert("削除に失敗しました");
});

document.getElementById("writeBtn").addEventListener("click", function() {
    if (currentUser === "null") {
        openModal("loginModal");
        return;
    }
    location.href = "/board/write";
});

function openModal(id) {
    document.getElementById(id).style.display = "flex";
}

function closeModal() {
    document.querySelectorAll(".modal").forEach(function(m) {
        m.style.display = "none";
    });
}

window.addEventListener("click", function(e) {
    if (e.target.classList.contains("modal")) {
        e.target.style.display = "none";
    }
});

document.getElementById("mainBtn").addEventListener("click", function() {
    location.reload();
});

window.onload = async function() {
    await renderAuth();
    await renderBoard();
};
</script>

</body>
</html>
