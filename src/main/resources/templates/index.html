<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

button {
    cursor: pointer;
    box-sizing: border-box;
    border: none;
    background: #333;
    color: white;
    transition: 0.2s;
}

button:hover {
    background: #555;
}

.container {
    width: 900px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

/* header */
.header {
    display: flex;
    align-items: center;
    padding: 10px;
    height: 60px;
    border-bottom: 1px solid #ddd;
}

.header button {
    height: 100%;
    padding: 0 15px;
    border-radius: 5px;
}

.main-btn { width: 80px; }

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

.auth {
    display: flex;
    gap: 10px;
    height: 100%;
    align-items: center;
}

/* content */
.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* table */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #eee;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

tbody tr:hover {
    background: #f9f9f9;
}

.empty {
    text-align: center;
    margin-top: 50px;
    color: #888;
}

/* footer */
.footer {
    padding: 10px;
    border-top: 1px solid #ddd;
    text-align: right;
}

/* modal */
.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);

    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}

.modal input {
    width: 100%;
    margin: 10px 0;
    padding: 8px;
}

.close {
    margin-top: 10px;
    background: crimson;
}
</style>
</head>

<body>

<div class="container">

    <!-- header -->
    <div class="header">
        <button class="main-btn" onclick="location.reload()">Main</button>

        <div class="title">本日の出来事は</div>

        <div class="auth" id="authArea">
            <button onclick="openLogin()">ログイン</button>
            <button onclick="openSignup()">会員登録</button>
        </div>
    </div>

    <!-- 게시판 -->
    <div class="content">

        <table>
            <thead>
                <tr>
                    <th>番号</th>
                    <th>タイトル</th>
                    <th>作成者</th>
                    <th>作成日</th>
                    <th>閲覧数</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>

        <div class="empty" id="emptyMsg">投稿がありません</div>

    </div>

    <!-- footer -->
    <div class="footer">
        <button onclick="goWrite()">投稿</button>
    </div>

</div>

<!-- 로그인 -->
<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>ログイン</h3>

        <input id="li-username" placeholder="ユーザー名">
        <input id="li-password" type="password" placeholder="パスワード">

        <button onclick="login()">ログイン</button>
        <button class="close" onclick="closeModal()">閉じる</button>
    </div>
</div>

<!-- 회원가입 -->
<div class="modal" id="signupModal">
    <div class="modal-box">
        <h3>会員登録</h3>

        <input id="su-username" placeholder="ユーザー名">
        <input id="su-password" type="password" placeholder="パスワード">

        <button onclick="signup()">登録</button>
        <button class="close" onclick="closeModal()">閉じる</button>
    </div>
</div>

<script>
function openLogin(){
    document.getElementById("loginModal").style.display = "flex";
}

function openSignup(){
    document.getElementById("signupModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("loginModal").style.display = "none";
    document.getElementById("signupModal").style.display = "none";
}

/* 회원가입 */
function signup(){
    const u = document.getElementById("su-username").value.trim();
    const p = document.getElementById("su-password").value.trim();

    fetch("/user/signup", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(res => res.text())
    .then(result => {
        if(result === "OK"){
            alert("登録成功！");
            closeModal();
        } else {
            alert("エラー発生");
        }
    });
}

/* 로그인 */
function login(){
    const u = document.getElementById("li-username").value.trim();
    const p = document.getElementById("li-password").value.trim();

    fetch("/user/login", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(res => res.text())
    .then(result => {
        if(result === "OK"){
            alert("ログイン成功");
            closeModal();
            checkLogin();
        } else {
            alert("ログイン失敗");
        }
    });
}

/* 로그인 상태 체크 */
function checkLogin(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {
        if(user !== "null"){
            document.getElementById("authArea").innerHTML = `
                <span>${user}</span>
                <button onclick="logout()">ログアウト</button>
            `;
        }
    });
}

/* 로그아웃 */
function logout(){
    fetch("/user/logout", { method: "POST" })
    .then(() => location.reload());
}

/* 글쓰기 */
function goWrite(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {
        if(user === "null"){
            alert("ログインしてください");
            openLogin();
            return;
        }
        
        location.href = "/board/write";
        	
    });
}

function loadBoard(){
    fetch("/board/list")
    .then(res => res.json())
    .then(data => {

        const body = document.getElementById("boardBody");
        const empty = document.getElementById("emptyMsg");

        body.innerHTML = "";

        if(data.length === 0){
            empty.style.display = "block";
            return;
        }

        empty.style.display = "none";

        data.forEach((b, index) => {
            body.innerHTML += `
                <tr>
                    <td>${index + 1}</td>
                    <td><a href="#">${b.title}</a></td>
                    <td>${b.author}</td>
                    <td>${b.createdAt ? b.createdAt.replace('T',' ').substring(0,16) : ''}</td>
                    <td>${b.viewCount}</td>
                </tr>
            `;
        });
    });
}

/* 초기 실행 */
window.onload = function(){
    checkLogin();
    loadBoard();
};
</script>

</body>
</html>
