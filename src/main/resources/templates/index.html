<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* 전체 박스 */
.container {
    width: 800px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border: 2px solid black;
    display: flex;
    flex-direction: column;
}

/* ===== 상단 ===== */
.header {
    display: flex;
    align-items: center;
    border-bottom: 2px solid black;
    padding: 10px;
}

.main-btn {
    width: 80px;
}

.title {
    flex: 1;
    text-align: center;
    border: 1px solid black;
    padding: 5px;
}

.auth {
    display: flex;
    gap: 10px;
}

/* ===== 검색 ===== */
.search {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-bottom: 2px solid black;
}

.search input {
    width: 100px;
    padding: 5px;
}

.search .title-input {
    width: 250px;
}

/* ===== 게시판 ===== */
.content {
    flex: 1;
    overflow-y: auto;
}

/* 테이블 */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

/* 빈 상태 */
.empty {
    text-align: center;
    margin-top: 200px;
}

/* ===== 하단 ===== */
.footer {
    border-top: 2px solid black;
    padding: 10px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.pagination {
    display: flex;
    gap: 10px;
}

.page-info {
    flex: 1;
    text-align: center;
}

.write-btn {
    width: 100px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">

        <button class="main-btn" onclick="location.href='/'">Main</button>

        <div class="title">掲示板タイトル</div>

        <div class="auth">
            <button onclick="login()">ログイン</button>
            <button onclick="location.href='/signup'">会員登録</button>
        </div>

    </div>

    <!-- 검색 -->
    <div class="search">
        <span>番号</span>
        <input>

        <span>タイトル</span>
        <input class="title-input">

        <span>作成者</span>
        <input>

        <button>検索</button>
    </div>

    <!-- 게시판 -->
    <div class="content">

        <table>
            <thead>
                <tr>
                    <th>番号</th>
                    <th>タイトル</th>
                    <th>作成者</th>
                    <th>作成日</th>
                    <th>閲覧数</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>

        <div class="empty">投稿がありません</div>

    </div>

    <!-- 하단 -->
    <div class="footer">

        <div class="pagination">
            <button>前へ</button>
            <button>次へ</button>
        </div>

        <div class="page-info">
            1 / 1 ページ
        </div>

        <button class="write-btn" onclick="goWrite()">投稿</button>

    </div>

</div>

<script>
function login(){
    alert("ログイン処理 연결 필요");
}

function goWrite(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {
        if(user === "null"){
            alert("ログインしてください");
            location.href = "/login";
        } else {
            location.href = "/board/write";
        }
    });
}
</script>

</body>
</html>
