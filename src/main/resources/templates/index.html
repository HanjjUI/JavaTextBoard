<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

button {
    cursor: pointer;
    border: none;
    background: #333;
    color: white;
    padding: 8px 12px;
}

.container {
    width: 900px;
    max-width: 95%;
    min-height: 90vh;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
}

.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

.title-link {
    cursor: pointer;
    color: #333;
}

.footer {
    padding: 10px;
    text-align: right;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 8px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <button id="mainBtn">Main</button>
    <div class="title">本日の出来事は</div>
    <div id="authArea"></div>
</div>

<div class="content">
    <table>
        <thead>
            <tr>
                <th>番号</th>
                <th>タイトル</th>
                <th>作成者</th>
                <th>日付</th>
                <th>閲覧数</th>
            </tr>
        </thead>
        <tbody id="boardBody"></tbody>
    </table>
</div>

<div class="footer">
    <button id="writeBtn">投稿</button>
</div>

</div>

<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>ログイン</h3>
        <input id="li-username" placeholder="ユーザー名">
        <input id="li-password" type="password" placeholder="パスワード">
        <button id="loginBtn">ログイン</button>
    </div>
</div>

<div class="modal" id="detailModal">
    <div class="modal-box">
        <h3 id="detailTitle"></h3>
        <p id="detailContent"></p>
        <button id="editBtn">編集</button>
        <button id="deleteBtn">削除</button>
    </div>
</div>

<script>
function escapeHTML(str = ""){
    return str.replace(/[&<>"']/g, m => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
    })[m]);
}

async function request(url, options = {}){
    try{
        const res = await fetch(url, options);
        if(!res.ok) throw new Error("Server Error");
        return res;
    }catch(e){
        alert("通信エラー");
        throw e;
    }
}

let currentUser = null;
let currentPostId = null;

const API = {
    async getUser(){
        const res = await request("/user/me");
        return await res.text();
    },

    async login(u, p){
        const res = await request("/user/login", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: `u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
        });
        return await res.text();
    },

    async list(){
        const res = await request("/board/list");
        return await res.json();
    },

    async detail(id){
        const res = await request(`/board/${id}`);
        return await res.json();
    },

    async delete(id){
        const res = await request(`/board/${id}`, {method: "DELETE"});
        return await res.text();
    }
};

async function renderAuth(){
    currentUser = await API.getUser();

    const area = document.getElementById("authArea");

    if(currentUser !== "null"){
        area.innerHTML = `
            <span>${escapeHTML(currentUser)}</span>
            <button id="logoutBtn">ログアウト</button>
        `;
        document.getElementById("logoutBtn")
            .addEventListener("click", logout);
    }else{
        area.innerHTML = `
            <button id="openLoginBtn">ログイン</button>
        `;
        document.getElementById("openLoginBtn")
            .addEventListener("click", () => openModal("loginModal"));
    }
}

async function renderBoard(){
    const data = await API.list();
    const body = document.getElementById("boardBody");

    if(data.length === 0){
        body.innerHTML = "<tr><td colspan='5'>投稿がありません</td></tr>";
        return;
    }

    const rows = data.map((b, i) => `
        <tr>
            <td>${i + 1}</td>
            <td class="title-link" data-id="${b.id}">${escapeHTML(b.title)}</td>
            <td>${escapeHTML(b.author)}</td>
            <td>${b.createdAt ? b.createdAt.replace("T", " ").substring(0, 16) : ""}</td>
            <td>${b.viewCount}</td>
        </tr>
    `).join("");

    body.innerHTML = rows;

    document.querySelectorAll(".title-link")
        .forEach(el => {
            el.addEventListener("click", e => {
                viewDetail(e.target.dataset.id);
            });
        });
}

document.getElementById("loginBtn")
    .addEventListener("click", async () => {
        const u = document.getElementById("li-username").value;
        const p = document.getElementById("li-password").value;

        const res = await API.login(u, p);

        if(res === "OK"){
            closeModal();
            await renderAuth();
        }else{
            alert("ログイン失敗");
        }
    });

function logout(){
    fetch("/user/logout", {method: "POST"})
        .then(() => location.reload());
}

async function viewDetail(id){
    currentPostId = id;

    const data = await API.detail(id);

    document.getElementById("detailTitle").innerText = data.title;
    document.getElementById("detailContent").innerText = data.content;

    const canManage = currentUser !== "null" && currentUser === data.author;
    document.getElementById("editBtn").style.display = canManage ? "inline-block" : "none";
    document.getElementById("deleteBtn").style.display = canManage ? "inline-block" : "none";

    openModal("detailModal");
}

document.getElementById("editBtn")
    .addEventListener("click", () => {
        location.href = `/board/write?id=${currentPostId}`;
    });

document.getElementById("deleteBtn")
    .addEventListener("click", async () => {
        if(!confirm("削除しますか？")) return;

        const res = await API.delete(currentPostId);

        if(res === "OK"){
            closeModal();
            await renderBoard();
            return;
        }

        if(res === "LOGIN_REQUIRED"){
            alert("ログインが必要です");
            location.href = "/login";
            return;
        }

        alert("削除に失敗しました");
    });

document.getElementById("writeBtn")
    .addEventListener("click", () => {
        if(currentUser === "null"){
            openModal("loginModal");
            return;
        }
        location.href = "/board/write";
    });

function openModal(id){
    document.getElementById(id).style.display = "flex";
}

function closeModal(){
    document.querySelectorAll(".modal")
        .forEach(m => m.style.display = "none");
}

window.addEventListener("click", e => {
    if(e.target.classList.contains("modal")){
        e.target.style.display = "none";
    }
});

document.getElementById("mainBtn")
    .addEventListener("click", () => location.reload());

window.onload = async () => {
    await renderAuth();
    await renderBoard();
};
</script>

</body>
</html>
