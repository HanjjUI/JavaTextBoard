<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* 전체 박스 */
.container {
    width: 800px;
    margin: 40px auto;
    background: white;
    border: 2px solid black;
    padding: 20px;
}

/* ===== 상단 ===== */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    border: 1px solid black;
    padding: 5px 10px;
}

.title {
    flex: 1;
    margin: 0 20px;
    border: 1px solid black;
    text-align: center;
    padding: 5px;
}

.auth button {
    margin-left: 10px;
}

/* ===== 검색 영역 ===== */
.search {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.search input {
    padding: 5px;
}

/* ===== 테이블 ===== */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

/* ===== 게시글 없음 ===== */
.empty {
    height: 300px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: gray;
}

/* ===== 하단 ===== */
.footer {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.pagination {
    display: flex;
    gap: 10px;
}

.write-btn {
    padding: 8px 15px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">
        <div class="logo">main page</div>

        <div class="title">掲示板タイトル</div>

        <div class="auth">
            <button onclick="location.href='/login'">ログイン</button>
            <button onclick="location.href='/signup'">会員登録</button>
        </div>
    </div>

    <!-- 검색 -->
    <div class="search">
        <input placeholder="番号">
        <input placeholder="タイトル">
        <input placeholder="作成者">
        <button>検索</button>
    </div>

    <!-- 게시판 -->
    <table>
        <thead>
            <tr>
                <th>番号</th>
                <th>タイトル</th>
                <th>作成者</th>
                <th>作成日</th>
                <th>閲覧数</th>
            </tr>
        </thead>
        <tbody id="boardBody">
            <!-- 데이터 들어갈 자리 -->
        </tbody>
    </table>

    <!-- 게시글 없음 -->
    <div class="empty" id="emptyMessage">
        投稿がありません
    </div>

    <!-- 하단 -->
    <div class="footer">
        <div class="pagination">
            <button>前へ</button>
            <button>次へ</button>
        </div>

        <button class="write-btn">投稿する</button>
    </div>

</div>

<script>
// 로그인 상태 표시
fetch("/user/me")
.then(res => res.text())
.then(user => {
    if(user && user !== "null"){
        console.log(user + " 로그인중");
    }
});
</script>

</body>
</html>
