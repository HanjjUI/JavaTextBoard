<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

button {
    cursor: pointer;
    border: none;
    background: #333;
    color: white;
    transition: 0.2s;
    padding: 8px 12px;
}
button:hover { background: #555; }

.container {
    width: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
}

.auth { display: flex; gap: 10px; }

.content {
    flex: 1;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}
tbody tr:hover { background: #f9f9f9; }

.footer {
    padding: 10px;
    text-align: right;
}

/* modal */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}
.modal-box {
    background:white;
    padding:20px;
    border-radius:10px;
    width:400px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <button onclick="location.reload()">Main</button>
    <div class="title">本日の出来事は</div>
    <div id="authArea">
        <button onclick="openLogin()">ログイン</button>
        <button onclick="openSignup()">会員登録</button>
    </div>
</div>

<div class="content">
<table>
<thead>
<tr>
<th>番号</th><th>タイトル</th><th>作成者</th><th>日付</th><th>閲覧数</th>
</tr>
</thead>
<tbody id="boardBody"></tbody>
</table>
</div>

<div class="footer">
<button onclick="goWrite()">投稿</button>
</div>

</div>

<!-- 상세 -->
<div class="modal" id="detailModal">
<div class="modal-box">

<h3 id="detailTitle"></h3>
<input id="editTitle" style="display:none; width:100%;">

<p id="detailAuthor"></p>
<hr>

<p id="detailContent"></p>
<textarea id="editContent" style="display:none; width:100%; height:100px;"></textarea>

<div id="detailButtons">
<button onclick="startEdit()">修正</button>
<button onclick="deletePost()">削除</button>
<button onclick="closeDetail()">閉じる</button>
</div>

<div id="editButtons" style="display:none;">
<button onclick="saveEdit()">保存</button>
<button onclick="cancelEdit()">キャンセル</button>
</div>

</div>
</div>

<script>

/* ================= API ================= */
const BoardAPI = {
    list: () => fetch("/board/list").then(r=>r.json()),
    detail: (id) => fetch(`/board/${id}`).then(r=>r.json()),
    delete: (id) => fetch(`/board/${id}`, {method:"DELETE"}).then(r=>r.text()),
    update: (id, body) => fetch(`/board/${id}`, {
        method:"PUT",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body
    }).then(r=>r.text())
};

/* ================= 상태 ================= */
let currentPostId = null;

/* ================= UX ================= */
document.addEventListener("keydown", e=>{
    if(e.key==="Escape") closeDetail();
});
document.getElementById("detailModal").addEventListener("click", e=>{
    if(e.target===e.currentTarget) closeDetail();
});

/* ================= 게시판 ================= */
function loadBoard(){
    BoardAPI.list().then(data=>{
        const body = document.getElementById("boardBody");
        body.innerHTML="";

        data.forEach((b,i)=>{
            body.innerHTML+=`
            <tr>
                <td>${i+1}</td>
                <td><a href="#" onclick="viewDetail(${b.id})">${b.title}</a></td>
                <td>${b.author}</td>
                <td>${b.createdAt?.substring(0,16)}</td>
                <td>${b.viewCount}</td>
            </tr>`;
        });
    });
}

/* ================= 상세 ================= */
function viewDetail(id){
    currentPostId = id;

    BoardAPI.detail(id).then(data=>{
        document.getElementById("detailTitle").innerText = data.title;
        document.getElementById("detailContent").innerText = data.content;
        document.getElementById("detailAuthor").innerText = "작성자: "+data.author;

        fetch("/user/me")
        .then(r=>r.text())
        .then(user=>{
            document.getElementById("detailButtons").style.display =
                (user===data.author) ? "block" : "none";
        });

        document.getElementById("detailModal").style.display="flex";
    });
}

function closeDetail(){
    document.getElementById("detailModal").style.display="none";
}

/* ================= 삭제 ================= */
function deletePost(){
    if(!confirm("削除しますか？")) return;

    BoardAPI.delete(currentPostId).then(res=>{
        if(res==="OK"){
            alert("削除成功");
            closeDetail();
            loadBoard();
        }
    });
}

/* ================= 수정 ================= */
function startEdit(){
    const t = detailTitle.innerText;
    const c = detailContent.innerText;

    editTitle.value = t;
    editContent.value = c;

    detailTitle.style.display="none";
    detailContent.style.display="none";

    editTitle.style.display="block";
    editContent.style.display="block";

    detailButtons.style.display="none";
    editButtons.style.display="block";
}

function saveEdit(){
    const t = editTitle.value.trim();
    const c = editContent.value.trim();

    if(t.length<2){ alert("タイトル短い"); return; }
    if(c.length<5){ alert("内容短い"); return; }

    BoardAPI.update(currentPostId, `title=${encodeURIComponent(t)}&content=${encodeURIComponent(c)}`)
    .then(res=>{
        if(res==="OK"){
            alert("修正成功");
            closeDetail();
            loadBoard();
        }
    });
}

function cancelEdit(){
    detailTitle.style.display="block";
    detailContent.style.display="block";

    editTitle.style.display="none";
    editContent.style.display="none";

    detailButtons.style.display="block";
    editButtons.style.display="none";
}

/* ================= 로그인 ================= */
function openLogin(){ alert("ログイン機能は既存利用"); }
function openSignup(){ alert("会員登録は既存利用"); }

function goWrite(){
    fetch("/user/me")
    .then(r=>r.text())
    .then(user=>{
        if(user==="null"){
            alert("ログイン必要");
            return;
        }
        location.href="/board/write";
    });
}

/* ================= 초기 ================= */
window.onload = ()=>{
    loadBoard();
};

</script>

</body>
</html>
