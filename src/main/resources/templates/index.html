<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(180deg, #f4f4f4 0%, #ececec 100%);
    margin: 0;
    color: #222;
}

button {
    cursor: pointer;
    border: none;
    background: #2f2f2f;
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: background 0.2s ease;
}

button:hover {
    background: #111;
}

.container {
    width: 900px;
    max-width: 94%;
    min-height: auto;
    margin: 36px auto;
    background: white;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    display: flex;
    align-items: center;
    padding: 18px 22px;
    border-bottom: 1px solid #e5e5e5;
    background: #fafafa;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.5px;
}

#authArea {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 140px;
    justify-content: flex-end;
    font-size: 14px;
}

.content {
    padding: 10px 22px 24px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
}

th, td {
    padding: 14px 10px;
    border-bottom: 1px solid #ececec;
    text-align: center;
    font-size: 14px;
}

th {
    background: #fafafa;
    font-weight: 700;
}

.title-link {
    cursor: pointer;
    color: #222;
    font-weight: 500;
    transition: color 0.2s ease;
}

.title-link:hover {
    color: #0f62fe;
    text-decoration: underline;
}

.footer {
    padding: 18px 22px 22px;
    text-align: right;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 16px;
    box-sizing: border-box;
}

.modal-box {
    background: white;
    padding: 24px;
    border-radius: 14px;
    width: 360px;
    max-width: 100%;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
}

.modal-box h3 {
    margin-top: 0;
    margin-bottom: 14px;
    font-size: 20px;
}

.modal-box p {
    line-height: 1.6;
    margin-bottom: 18px;
    word-break: break-word;
}

input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 10px 12px;
    box-sizing: border-box;
    border: 1px solid #d6d6d6;
    border-radius: 8px;
    font-size: 14px;
}

#editBtn {
    margin-right: 8px;
}

@media (max-width: 768px) {
    .header {
        gap: 10px;
        flex-wrap: wrap;
    }

    .title {
        order: -1;
        width: 100%;
        text-align: center;
    }

    #authArea {
        min-width: auto;
    }

    th, td {
        font-size: 13px;
        padding: 10px 6px;
    }
}
</style>
