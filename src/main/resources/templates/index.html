<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

button {
    cursor: pointer;
    border: none;
    background: #333;
    color: white;
    transition: 0.2s;
    padding: 8px 12px;
}
button:hover { background: #555; }

.container {
    width: 900px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
}

.header {
    display: flex;
    align-items: center;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

.title {
    flex: 1;
    text-align: center;
    font-weight: bold;
}

.auth {
    display: flex;
    gap: 10px;
}

.content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #eee;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

tbody tr:hover {
    background: #f9f9f9;
}

.footer {
    padding: 10px;
    text-align: right;
}

/* modal */
.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);

    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
}

.modal-box h3 {
    margin-bottom: 15px;
}
.modal-box button {
    width: 45%;
    margin: 10px 5px 0;
    padding: 8px;
    border-radius: 5px;
    transition: 0.2s;
}

/* 닫기 버튼 색상 */
.modal-box button:last-child {
    background: #888;
}

.modal-box button:last-child:hover {
    background: #666;
}
.modal-box input {
    width: 90%;
    margin: 8px auto;
    display: block;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
}
/* input */
input, textarea {
    width: 100%;
    margin: 10px 0;
    padding: 8px;
}
</style>
</head>

<body>

<div class="container">

<!-- header -->
<div class="header">
    <button onclick="location.reload()">Main</button>
    <div class="title">本日の出来事は</div>

    <div class="auth" id="authArea">
        <button onclick="openLogin()">ログイン</button>
        <button onclick="openSignup()">会員登録</button>
    </div>
</div>

<!-- 게시판 -->
<div class="content">
    <table>
        <thead>
            <tr>
                <th>番号</th>
                <th>タイトル</th>
                <th>作成者</th>
                <th>作成日</th>
                <th>閲覧数</th>
            </tr>
        </thead>
        <tbody id="boardBody"></tbody>
    </table>

    <div id="emptyMsg" style="text-align:center; margin-top:30px; display:none;">
        投稿がありません
    </div>
</div>

<!-- footer -->
<div class="footer">
    <button onclick="goWrite()">投稿</button>
</div>

</div>

<!-- 로그인 -->
<div class="modal" id="loginModal">
    <div class="modal-box">
        <h3>ログイン</h3>

        <input id="li-username" placeholder="ユーザー名">
        <input id="li-password" type="password" placeholder="パスワード">

        <button onclick="login()">ログイン</button>
        <button onclick="closeModal()">閉じる</button>
    </div>
</div>

<!-- 회원가입 -->
<div class="modal" id="signupModal">
    <div class="modal-box">
        <h3>会員登録</h3>

        <input id="su-username" placeholder="ユーザー名">
        <input id="su-password" type="password" placeholder="パスワード">

        <button onclick="signup()">登録</button>
        <button onclick="closeModal()">閉じる</button>
    </div>
</div>

<!-- 상세 -->
<div class="modal" id="detailModal">
    <div class="modal-box">

        <h3 id="detailTitle"></h3>
        <input id="editTitle" style="display:none;">

        <p id="detailAuthor"></p>
        <hr>

        <p id="detailContent"></p>
        <textarea id="editContent" style="display:none;"></textarea>

        <div id="detailButtons">
            <button onclick="startEdit()">修正</button>
            <button onclick="deletePost()">削除</button>
            <button onclick="closeDetail()">閉じる</button>
        </div>

        <div id="editButtons" style="display:none;">
            <button onclick="saveEdit()">保存</button>
            <button onclick="cancelEdit()">キャンセル</button>
        </div>

    </div>
</div>

<script>

/* ================= 상태 ================= */
let currentPostId = null;

/* ================= API ================= */
const BoardAPI = {
    list: () => fetch("/board/list").then(r=>r.json()),
    detail: (id) => fetch(`/board/${id}`).then(r=>r.json()),
    delete: (id) => fetch(`/board/${id}`, {method:"DELETE"}).then(r=>r.text()),
    update: (id, body) => fetch(`/board/${id}`, {
        method:"PUT",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body
    }).then(r=>r.text())
};

/* ================= 로그인 ================= */
function openLogin(){
    document.getElementById("loginModal").style.display="flex";
}
function openSignup(){
    document.getElementById("signupModal").style.display="flex";
}
function closeModal(){
    document.getElementById("loginModal").style.display="none";
    document.getElementById("signupModal").style.display="none";
}

/* ✅ 수정 완료 */
function signup(){
    const u = document.getElementById("su-username").value.trim();
    const p = document.getElementById("su-password").value.trim();

    fetch("/user/signup", {
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:`u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(r=>r.text())
    .then(res=>{
        if(res==="OK"){
            alert("登録成功");
            closeModal();
        } else {
            alert("登録失敗");
        }
    })
    .catch(()=>alert("通信エラー"));
}

/* ✅ 수정 완료 */
function login(){
    const u = document.getElementById("li-username").value.trim();
    const p = document.getElementById("li-password").value.trim();

    fetch("/user/login", {
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:`u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(r=>r.text())
    .then(res=>{
        if(res==="OK"){
            alert("ログイン成功");
            closeModal();
            checkLogin();
        } else {
            alert("ログイン失敗");
        }
    })
    .catch(()=>alert("通信エラー"));
}

function checkLogin(){
    fetch("/user/me")
    .then(r=>r.text())
    .then(user=>{
        if(user!=="null"){
            document.getElementById("authArea").innerHTML = `
                <span>${user}</span>
                <button onclick="logout()">ログアウト</button>
            `;
        }
    });
}

function logout(){
    fetch("/user/logout",{method:"POST"})
    .then(()=>location.reload());
}

/* ================= 게시판 ================= */
function loadBoard(){
    BoardAPI.list().then(data=>{
        const body = document.getElementById("boardBody");
        const empty = document.getElementById("emptyMsg");

        body.innerHTML="";

        if(data.length===0){
            empty.style.display="block";
            return;
        }

        empty.style.display="none";

        data.forEach((b,i)=>{
            body.innerHTML+=`
            <tr>
                <td>${i+1}</td>
                <td><a href="#" onclick="viewDetail(${b.id})">${b.title}</a></td>
                <td>${b.author}</td>
                <td>${b.createdAt?.substring(0,16)}</td>
                <td>${b.viewCount}</td>
            </tr>`;
        });
    });
}

/* ================= 상세 ================= */
function viewDetail(id){
    currentPostId=id;

    BoardAPI.detail(id).then(data=>{
        document.getElementById("detailTitle").innerText=data.title;
        document.getElementById("detailContent").innerText=data.content;
        document.getElementById("detailAuthor").innerText="작성자: "+data.author;

        fetch("/user/me")
        .then(r=>r.text())
        .then(user=>{
            document.getElementById("detailButtons").style.display =
                (user===data.author) ? "block" : "none";
        });

        document.getElementById("detailModal").style.display="flex";
    });
}

function closeDetail(){
    document.getElementById("detailModal").style.display="none";
}

/* 삭제 */
function deletePost(){
    if(!confirm("削除しますか？")) return;

    BoardAPI.delete(currentPostId).then(res=>{
        if(res==="OK"){
            alert("削除成功");
            closeDetail();
            loadBoard();
        }
    });
}

/* 수정 */
function startEdit(){
    document.getElementById("editTitle").value =
        document.getElementById("detailTitle").innerText;

    document.getElementById("editContent").value =
        document.getElementById("detailContent").innerText;

    document.getElementById("detailTitle").style.display="none";
    document.getElementById("detailContent").style.display="none";

    document.getElementById("editTitle").style.display="block";
    document.getElementById("editContent").style.display="block";

    document.getElementById("detailButtons").style.display="none";
    document.getElementById("editButtons").style.display="block";
}

function saveEdit(){
    const t=document.getElementById("editTitle").value.trim();
    const c=document.getElementById("editContent").value.trim();

    if(t.length<2){ alert("タイトル短い"); return; }
    if(c.length<5){ alert("内容短い"); return; }

    BoardAPI.update(currentPostId,
        `title=${encodeURIComponent(t)}&content=${encodeURIComponent(c)}`
    )
    .then(res=>{
        if(res==="OK"){
            alert("修正成功");
            closeDetail();
            loadBoard();
        }
    });
}

function cancelEdit(){
    document.getElementById("detailTitle").style.display="block";
    document.getElementById("detailContent").style.display="block";

    document.getElementById("editTitle").style.display="none";
    document.getElementById("editContent").style.display="none";

    document.getElementById("detailButtons").style.display="block";
    document.getElementById("editButtons").style.display="none";
}

/* 기타 */
function goWrite(){
    fetch("/user/me")
    .then(r=>r.text())
    .then(user=>{
        if(user==="null"){
            alert("ログインしてください");
            openLogin();
            return;
        }
        location.href="/board/write";
    });
}

/* 초기 */
window.onload = ()=>{
    checkLogin();
    loadBoard();
};

</script>

</body>
</html>
