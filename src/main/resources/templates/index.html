<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #e9eef2;
    margin: 0;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 전체 */
.container {
    width: 420px;
    height: 90vh;
    background: white;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);

    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ===== 상단 ===== */
.header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* 상단 줄 */
.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 로그인 영역 */
.login-area {
    display: flex;
    align-items: center;
    gap: 5px;
}

#loginForm {
    display: flex;
    gap: 5px;
}

#loginForm input {
    width: 70px;
    padding: 4px;
    font-size: 12px;
}

#userInfo {
    display: none;
    font-size: 12px;
}

/* 제목 */
.title {
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    margin: 10px 0;
}

/* ===== 검색 ===== */
.search {
    display: flex;
    gap: 5px;
}

.search input {
    width: 70px;
    padding: 5px;
    font-size: 12px;
}

.search button {
    padding: 5px 6px;
    font-size: 12px;
    cursor: pointer;
}

/* ===== 게시판 ===== */
.content {
    flex: 1;
    overflow-y: auto;
}

/* 테이블 */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #f5f5f5;
    font-size: 12px;
}

th, td {
    border-bottom: 1px solid #eee;
    padding: 6px;
    text-align: center;
    font-size: 12px;
}

/* 빈 상태 */
.empty {
    text-align: center;
    color: gray;
    margin-top: 100px;
}

/* ===== 하단 ===== */
.footer {
    padding: 10px;
    border-top: 1px solid #ddd;
    text-align: right;
}

.write-btn {
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">

        <div class="top-row">
            <button onclick="location.href='/'">Main</button>

            <div class="login-area">

                <!-- 로그인 입력 -->
                <div id="loginForm">
                    <input id="username" placeholder="ID">
                    <input id="password" type="password" placeholder="PW">
                </div>

                <!-- 로그인 상태 -->
                <div id="userInfo">
                    <span id="welcome"></span>
                    <button onclick="logout()">ログアウト</button>
                </div>

            </div>
        </div>

        <div class="title">今日の出来事は</div>

        <!-- 검색 + 버튼 -->
        <div class="search">
            <input placeholder="番号">
            <input placeholder="タイトル">
            <input placeholder="作成者">

            <button>検索</button>
            <button onclick="login()">ログイン</button>
            <button onclick="location.href='/signup'">登録</button>
        </div>

    </div>

    <!-- 게시판 -->
    <div class="content">
        <table>
            <thead>
                <tr>
                    <th>番号</th>
                    <th>タイトル</th>
                    <th>作成者</th>
                    <th>日付</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>

        <div class="empty">投稿がありません</div>
    </div>

    <!-- 하단 -->
    <div class="footer">
        <button class="write-btn" onclick="goWrite()">投稿</button>
    </div>

</div>

<script>
// 페이지 로드시 로그인 체크
window.onload = function(){
    checkLogin();
};

// 로그인 상태 확인
function checkLogin(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {

        if(user && user !== "null"){
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("userInfo").style.display = "block";
            document.getElementById("welcome").innerText = user + " さん";
        }
    });
}

// 로그인
function login(){
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    fetch("/user/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "u=" + encodeURIComponent(u) + "&p=" + encodeURIComponent(p)
    })
    .then(res => res.text())
    .then(result => {
        if(result === "OK"){
            checkLogin();
        } else {
            alert("ログイン失敗");
        }
    });
}

// 로그아웃
function logout(){
    fetch("/user/logout", { method: "POST" })
    .then(() => location.reload());
}

// 글쓰기 이동
function goWrite(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {
        if(user === "null"){
            alert("ログインしてください");
            location.href = "/login";
        } else {
            location.href = "/board/write";
        }
    });
}
</script>

</body>
</html>
