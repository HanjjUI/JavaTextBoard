<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>掲示板アプリ</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
}

/* 전체 */
.container {
    width: 800px;
    height: 900px;
    margin: 40px auto;
    background: white;
    border: 2px solid black;
    display: flex;
    flex-direction: column;
}

/* ===== 상단 ===== */
.header {
    display: flex;
    align-items: center;
    padding: 10px;
    border-bottom: 2px solid black;
}

.title {
    flex: 1;
    text-align: center;
    border: 1px solid black;
    padding: 5px;
}

.auth {
    display: flex;
    gap: 10px;
}

/* ===== 검색 ===== */
.search {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-bottom: 2px solid black;
}

.search input {
    width: 100px;
    padding: 5px;
}

.search .title-input {
    width: 250px;
}

/* ===== 게시판 ===== */
.content {
    flex: 1;
    overflow-y: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid black;
    padding: 8px;
    text-align: center;
}

.empty {
    text-align: center;
    margin-top: 200px;
}

/* ===== 하단 ===== */
.footer {
    border-top: 2px solid black;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

.pagination {
    display: flex;
    gap: 10px;
}

/* ===== 모달 ===== */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;

    left: 0;
    top: 0;
    width: 100%;
    height: 100%;

    background: rgba(0,0,0,0.5);

    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 20px;
    width: 300px;
    text-align: center;
}

.modal-content input {
    width: 90%;
    margin: 10px;
    padding: 8px;
}
</style>
</head>

<body>

<div class="container">

    <!-- 상단 -->
    <div class="header">

        <button onclick="location.href='/'">Main</button>

        <div class="title">掲示板タイトル</div>

        <div class="auth">

            <!-- 로그인 상태 -->
            <span id="userDisplay"></span>

            <button id="loginBtn" onclick="openLogin()">ログイン</button>
            <button onclick="openSignup()">会員登録</button>

        </div>

    </div>

    <!-- 검색 -->
    <div class="search">
        <input placeholder="番号">
        <input class="title-input" placeholder="タイトル">
        <input placeholder="作成者">
        <button>検索</button>
    </div>

    <!-- 게시판 -->
    <div class="content">
        <table>
            <thead>
                <tr>
                    <th>番号</th>
                    <th>タイトル</th>
                    <th>作成者</th>
                    <th>作成日</th>
                    <th>閲覧数</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>

        <div class="empty">投稿がありません</div>
    </div>

    <!-- 하단 -->
    <div class="footer">
        <div class="pagination">
            <button>前へ</button>
            <button>次へ</button>
        </div>

        <button onclick="goWrite()">投稿</button>
    </div>

</div>

<!-- 🔥 로그인 모달 -->
<div id="loginModal" class="modal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2>ログイン</h2>
        <input id="lu" placeholder="ユーザー名"><br>
        <input id="lp" type="password" placeholder="パスワード"><br>

        <button onclick="login()">ログイン</button>
        <button onclick="closeLogin()">閉じる</button>

        <p id="lmsg"></p>
    </div>
</div>

<!-- 🔥 회원가입 모달 -->
<div id="signupModal" class="modal">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2>会員登録</h2>
        <input id="su" placeholder="ユーザー名"><br>
        <input id="sp" type="password" placeholder="パスワード"><br>

        <button onclick="signup()">登録</button>
        <button onclick="closeSignup()">閉じる</button>

        <p id="smsg"></p>
    </div>
</div>

<script>

// =======================
// 로그인 상태 체크
// =======================
window.onload = function(){
    checkLogin();
};

function checkLogin(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {

        if(user && user !== "null"){
            document.getElementById("userDisplay").innerText = user + " さん";

            document.getElementById("loginBtn").innerText = "ログアウト";
            document.getElementById("loginBtn").onclick = logout;
        }
    });
}

// =======================
// 로그인
// =======================
function openLogin(){
    document.getElementById("loginModal").style.display = "flex";
}

function closeLogin(){
    document.getElementById("loginModal").style.display = "none";
}

function login(){

    const u = document.getElementById("lu").value.trim();
    const p = document.getElementById("lp").value.trim();
    const msg = document.getElementById("lmsg");

    if(!u || !p){
        msg.innerText = "入力してください";
        return;
    }

    fetch("/user/login", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(res => res.text())
    .then(data => {
        if(data === "OK"){
            closeLogin();
            checkLogin();
        } else {
            msg.innerText = "ログイン失敗";
        }
    });
}

// =======================
// 로그아웃
// =======================
function logout(){
    fetch("/user/logout", {method:"POST"})
    .then(()=>location.reload());
}

// =======================
// 회원가입
// =======================
function openSignup(){
    document.getElementById("signupModal").style.display = "flex";
}

function closeSignup(){
    document.getElementById("signupModal").style.display = "none";
}

function signup(){

    const u = document.getElementById("su").value.trim();
    const p = document.getElementById("sp").value.trim();
    const msg = document.getElementById("smsg");

    if(!u || !p){
        msg.innerText = "入力してください";
        return;
    }

    fetch("/user/signup", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(res => res.text())
    .then(data => {
        if(data === "OK"){
            alert("登録完了");
            closeSignup();
        } else if(data === "DUPLICATE"){
            msg.innerText = "既に存在するユーザー";
        }
    });
}

// =======================
// 공통 UX
// =======================

// ESC 닫기
document.addEventListener("keydown", e => {
    if(e.key === "Escape"){
        closeLogin();
        closeSignup();
    }
});

// 바깥 클릭 닫기
window.onclick = function(e){
    if(e.target.id === "loginModal") closeLogin();
    if(e.target.id === "signupModal") closeSignup();
};

// =======================
// 글쓰기
// =======================
function goWrite(){
    fetch("/user/me")
    .then(res => res.text())
    .then(user => {
        if(user === "null"){
            alert("ログインしてください");
            openLogin();
        } else {
            location.href = "/board/write";
        }
    });
}

</script>

</body>
</html>
