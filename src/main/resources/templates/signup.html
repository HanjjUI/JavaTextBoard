<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>会員登録</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
            background: #f5f5f5;
        }

        .signup-box {
            width: 360px;
            margin: 0 auto;
            padding: 28px 24px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        input {
            width: 100%;
            max-width: 280px;
            margin: 10px auto;
            padding: 10px 12px;
            box-sizing: border-box;
            display: block;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            margin: 6px 4px 0;
        }

        #msg {
            color: red;
            margin-top: 10px;
        }

        a {
            display: block;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="signup-box">
    <h2>会員登録</h2>

    <input id="u" placeholder="ユーザー名"><br>
    <input id="p" type="password" placeholder="パスワード"><br>

    <div>
        <button onclick="signup()">登録</button>
        <button onclick="goMain()">メインに戻る</button>
    </div>

    <p id="msg"></p>

    <a href="/login">ログインへ戻る</a>
</div>

<script>
function signup(){

    const u = document.getElementById("u").value.trim();
    const p = document.getElementById("p").value.trim();
    const msg = document.getElementById("msg");

    if(!u || !p){
        msg.innerText = "ユーザー名とパスワードを入力してください";
        return;
    }

    fetch("/user/signup", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `u=${encodeURIComponent(u)}&p=${encodeURIComponent(p)}`
    })
    .then(res => res.text())
    .then(data => {

        if(data === "OK"){
            alert("登録完了");
            location.href = "/login";
        }
        else if(data === "DUPLICATE"){
            msg.innerText = "既に存在するユーザーです";
        }
        else{
            msg.innerText = "エラーが発生しました";
        }
    })
    .catch(() => {
        msg.innerText = "通信エラーが発生しました";
    });
}

function goMain(){
    location.href = "/";
}
</script>

</body>
</html>
