<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>掲示板一覧</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 40px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }

        th {
            background-color: #f5f5f5;
        }

        a {
            text-decoration: none;
            color: #333;
        }

        button {
            margin-top: 15px;
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>掲示板一覧</h2>

<button onclick="location.href='/board/write'">投稿作成</button>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>タイトル</th>
            <th>作成者</th>
            <th>作成日</th>
            <th>閲覧数</th>
        </tr>
    </thead>

    <tbody id="list"></tbody>
</table>

<script>
// 投稿一覧を取得します
fetch("/board/list")
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("list");

        // 投稿が1件もない場合の表示です
        if(data.length === 0){
            list.innerHTML = "<tr><td colspan='5'>投稿がありません</td></tr>";
            return;
        }

        // 取得した投稿データを1件ずつ画面に表示します
        data.forEach(b => {

            list.innerHTML +=
                "<tr>" +
                "<td>" + b.id + "</td>" +
                "<td><a href='/board/" + b.id + "'>" + b.title + "</a></td>" +
                "<td>" + b.author + "</td>" +
                "<td>" + (b.createdAt ? b.createdAt.replace('T',' ').substring(0,16) : '') + "</td>" +
                "<td>" + b.viewCount + "</td>" +
                "</tr>";
        });
    })
    .catch(() => {
        // データの取得に失敗した場合の表示です
        document.getElementById("list").innerHTML =
            "<tr><td colspan='5'>データ取得エラー</td></tr>";
    });
</script>

</body>
</html>
