<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>게시판</title>

<style>
body {
    width: 400px;
    margin: auto;
    border: 3px solid black;
    padding: 10px;
    font-family: Arial;
}

.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.item {
    border-bottom: 1px solid #ccc;
    padding: 5px;
    cursor: pointer;
}

.content-box {
    border: 2px solid black;
    height: 300px;
    padding: 10px;
    margin: 10px 0;
}

.bottom {
    display: flex;
    justify-content: space-between;
}
</style>

</head>
<body>

<!-- 메인 -->
<div id="mainView">
    <div class="top">
        <button onclick="goMain()">메인</button>
        <div>게시판</div>
        <button onclick="showWrite()">글쓰기</button>
    </div>
    <div id="list"></div>
</div>

<!-- 상세 -->
<div id="detailView" style="display:none;">
    <div class="top">
        <button onclick="goMain()">메인</button>
        <div id="d_title"></div>
        <button onclick="showWrite()">글쓰기</button>
    </div>

    <div>
        글번호: <span id="d_id"></span>
        작성자: <span id="d_author"></span>
        조회수: <span id="d_view"></span>
    </div>

    <div class="content-box" id="d_content"></div>

    <div class="bottom">
        <button onclick="editMode()">수정</button>
        <button onclick="deletePost()">삭제</button>
    </div>
</div>

<!-- 작성 -->
<div id="writeView" style="display:none;">
    <div class="top">
        <button onclick="goMain()">메인</button>
        <input id="w_title" placeholder="글제목">
        <button onclick="save()">저장</button>
    </div>

    <input id="w_author" placeholder="작성자">

    <div class="content-box">
        <textarea id="w_content" style="width:100%; height:100%;"></textarea>
    </div>
</div>

<script>

let currentId = null;
let editFlag = false;

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
}

function load() {
    fetch("/board")
        .then(res => res.json())
        .then(showList);
}

function showList(data) {

    mainView.style.display = "block";
    detailView.style.display = "none";
    writeView.style.display = "none";

    if (data.length === 0) {
        list.innerHTML = "작성된 글이 없습니다.";
        return;
    }

    list.innerHTML = "";

    data.forEach((item, index) => {
        list.innerHTML += `
            <div class="item" onclick="showDetail(${item.id})">
                ${index+1} | ${item.title} | ${item.author} |
                ${formatDate(item.createdAt)} | 조회수: ${item.viewCount}
            </div>
        `;
    });
}

function showDetail(id) {
    fetch("/board/" + id)
        .then(res => res.json())
        .then(data => {

            currentId = id;

            mainView.style.display = "none";
            detailView.style.display = "block";

            d_title.innerText = data.title;
            d_id.innerText = data.id;
            d_author.innerText = data.author;
            d_view.innerText = data.viewCount;
            d_content.innerText = data.content;
        });
}

function deletePost() {
    fetch("/board/" + currentId, { method: "DELETE" })
        .then(() => load());
}

function showWrite() {
    mainView.style.display = "none";
    detailView.style.display = "none";
    writeView.style.display = "block";

    editFlag = false;

    w_title.value = "";
    w_author.value = "";
    w_content.value = "";
}

function editMode() {
    fetch("/board/" + currentId)
        .then(res => res.json())
        .then(data => {

            showWrite();
            editFlag = true;

            w_title.value = data.title;
            w_author.value = data.author;
            w_content.value = data.content;
        });
}

function save() {

    if (editFlag) {
        fetch("/board/" + currentId, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                title: w_title.value,
                content: w_content.value
            })
        }).then(load);

    } else {
        fetch("/board", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                title: w_title.value,
                content: w_content.value,
                author: w_author.value
            })
        }).then(load);
    }
}

function goMain() {
    load();
}

load();

</script>

</body>
</html>
