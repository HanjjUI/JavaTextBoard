<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>게시판</title>

<style>
body {
    width: 400px;
    margin: auto;
    border: 3px solid black;
    padding: 10px;
    font-family: Arial;
}

/* 상단 */
.top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

/* 리스트 한 줄 */
.item {
    border-bottom: 1px solid #ccc;
    padding: 5px;
    cursor: pointer;
}

/* 상세 내용 */
.content-box {
    border: 2px solid black;
    height: 300px;
    padding: 10px;
    margin: 10px 0;
}

/* 버튼 영역 */
.bottom {
    display: flex;
    justify-content: space-between;
}
</style>

</head>
<body>

<!-- =========================
메인 화면
========================= -->
<div id="mainView">

    <div class="top">
        <button onclick="goMain()">메인</button>
        <div>게시판</div>
        <button onclick="showWrite()">글쓰기</button>
    </div>

    <div id="list"></div>

</div>

<!-- =========================
상세 화면
========================= -->
<div id="detailView" style="display:none;">

    <div class="top">
        <button onclick="goMain()">메인</button>
        <div id="d_title"></div>
        <button onclick="showWrite()">글쓰기</button>
    </div>

    <div>
        글번호: <span id="d_id"></span>
        &nbsp;&nbsp;
        작성자: <span id="d_author"></span>
    </div>

    <div class="content-box" id="d_content"></div>

    <div class="bottom">
        <button onclick="editMode()">수정</button>
        <button onclick="deletePost()">삭제</button>
    </div>

</div>

<!-- =========================
작성 화면
========================= -->
<div id="writeView" style="display:none;">

    <div class="top">
        <button onclick="goMain()">메인</button>
        <input id="w_title" placeholder="글제목">
        <button onclick="save()">저장</button>
    </div>

    <div class="content-box">
        <textarea id="w_content" style="width:100%; height:100%;"></textarea>
    </div>

</div>

<script>

let currentId = null;
let editFlag = false;

/* =========================
초기 로드
========================= */
function load() {
    fetch("/board")
        .then(res => res.json())
        .then(showList);
}

/* =========================
리스트
========================= */
function showList(data) {

    mainView.style.display = "block";
    detailView.style.display = "none";
    writeView.style.display = "none";

    if (data.length === 0) {
        list.innerHTML = "작성된 글이 없습니다.";
        return;
    }

    list.innerHTML = "";

    data.forEach(item => {
        list.innerHTML += `
            <div class="item" onclick="showDetail(${item.id})">
                ${item.id} | ${item.title} | ${item.author} | ${item.createdAt}
            </div>
        `;
    });
}

/* =========================
상세 보기
========================= */
function showDetail(id) {
    fetch("/board/" + id)
        .then(res => res.json())
        .then(data => {

            currentId = id;

            mainView.style.display = "none";
            detailView.style.display = "block";

            d_title.innerText = data.title;
            d_id.innerText = data.id;
            d_author.innerText = data.author;
            d_content.innerText = data.content;
        });
}

/* =========================
삭제
========================= */
function deletePost() {
    fetch("/board/" + currentId, { method: "DELETE" })
        .then(() => load());
}

/* =========================
작성 화면
========================= */
function showWrite() {

    mainView.style.display = "none";
    detailView.style.display = "none";
    writeView.style.display = "block";

    editFlag = false;

    w_title.value = "";
    w_content.value = "";
}

/* =========================
수정 모드
========================= */
function editMode() {
    fetch("/board/" + currentId)
        .then(res => res.json())
        .then(data => {

            showWrite();
            editFlag = true;

            w_title.value = data.title;
            w_content.value = data.content;
        });
}

/* =========================
저장
========================= */
function save() {

    if (editFlag) {
        fetch("/board/" + currentId, {
            method: "PUT",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                title: w_title.value,
                content: w_content.value
            })
        }).then(load);

    } else {
        fetch("/board", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                title: w_title.value,
                content: w_content.value,
                author: "익명"
            })
        }).then(load);
    }
}

/* =========================
메인 이동
========================= */
function goMain() {
    load();
}

load();

</script>

</body>
</html>
