<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>게시판</title>

<style>
body {
    width: 400px;
    margin: auto;
    border: 2px solid black;
    padding: 10px;
}
.top { display:flex; justify-content:space-between; }
.item { border-bottom:1px solid #ccc; padding:5px; cursor:pointer; }
.bottom { display:flex; justify-content:center; gap:5px; }
.hidden { display:none; }
</style>

</head>
<body>

<!-- 로그인 화면 -->

<div id="loginView">
    <h3>Please Sign In</h3>

```
<input id="username" placeholder="아이디"><br><br>
<input id="password" type="password" placeholder="비밀번호"><br><br>

<button onclick="login()">로그인</button>
<button onclick="signup()">회원가입</button>
<button onclick="guestLogin()">비회원 입장</button>
```

</div>

<hr>

<!-- 메인 -->

<div id="mainView" class="hidden">

```
<div class="top">
    <div id="welcomeText">게시판</div>
    <button onclick="logout()">로그아웃</button>
    <button onclick="showWrite()">글쓰기</button>
</div>

<hr>

<!-- 검색 -->
<div>
    <input id="keyword" placeholder="제목 검색">
    <input id="authorSearch" placeholder="작성자 검색">
    <button onclick="load(0)">검색</button>
</div>

<hr>

<div id="list"></div>
<div class="bottom" id="paging"></div>
```

</div>

<!-- 상세 -->

<div id="detailView" class="hidden">
    <button onclick="goMain()">메인</button>

```
<h3 id="d_title"></h3>

<div>
    번호: <span id="d_id"></span> |
    작성자: <span id="d_author"></span> |
    조회수: <span id="d_view"></span>
</div>

<div id="d_content"></div>

<button onclick="editMode()">수정</button>
<button onclick="deletePost()">삭제</button>
```

</div>

<!-- 작성 -->

<div id="writeView" class="hidden">
    <button onclick="goMain()">메인</button>

```
<input id="w_title" placeholder="제목"><br><br>
<textarea id="w_content"></textarea><br><br>

<button onclick="save()">저장</button>
```

</div>

<script>

let loginUser = "";
let currentId = null;
let editFlag = false;
let page = 0;

/* 화면 전환 */
function show(view){
    loginView.classList.add("hidden");
    mainView.classList.add("hidden");
    detailView.classList.add("hidden");
    writeView.classList.add("hidden");

    view.classList.remove("hidden");
}

/* 로그인 상태 체크 */
function checkLogin(){
    fetch("/user/me")
    .then(res=>res.text())
    .then(user=>{
        if(user){
            loginUser = user;
            enterMain();
        }else{
            show(loginView);
        }
    });
}

/* 메인 진입 */
function enterMain(){
    welcomeText.innerText = loginUser === "GUEST" 
        ? "비회원 모드" 
        : loginUser + "님 환영합니다";

    show(mainView);
    load();
}

/* 회원가입 */
function signup(){
    fetch(`/user/signup?username=${username.value}&password=${password.value}`,{
        method:"POST"
    }).then(()=>alert("가입 완료"));
}

/* 로그인 */
function login(){
    fetch(`/user/login?username=${username.value}&password=${password.value}`,{
        method:"POST"
    })
    .then(res=>res.text())
    .then(r=>{
        if(r==="OK"){
            loginUser = username.value;
            alert("로그인 성공");
            enterMain();
        }else{
            alert("로그인 실패");
        }
    });
}

/* 비회원 */
function guestLogin(){
    loginUser = "GUEST";
    alert("비회원으로 입장합니다");
    enterMain();
}

/* 로그아웃 */
function logout(){
    fetch("/user/logout",{method:"POST"})
    .then(()=>{
        loginUser="";
        show(loginView);
    });
}

/* 날짜 */
function formatDate(d){
    let x=new Date(d);
    return `${x.getFullYear()}/${x.getMonth()+1}/${x.getDate()} ${x.getHours()}:${x.getMinutes()}`;
}

/* 리스트 */
function load(p=0){
    page=p;

    fetch(`/board?page=${p}&size=5&keyword=${keyword.value||""}&author=${authorSearch.value||""}`)
    .then(res=>res.json())
    .then(data=>{
        showList(data.content);
        showPaging(data.totalPages);
    });
}

function showList(data){
    list.innerHTML="";
    data.forEach((i,idx)=>{
        list.innerHTML+=`
        <div class="item" onclick="showDetail(${i.id})">
        ${idx+1} | ${i.title} | ${i.author} | ${formatDate(i.createdAt)} | 조회수:${i.viewCount}
        </div>`;
    });
}

/* 페이징 */
function showPaging(total){
    paging.innerHTML="";
    for(let i=0;i<total;i++){
        paging.innerHTML+=`<button onclick="load(${i})">${i+1}</button>`;
    }
}

/* 상세 */
function showDetail(id){
    fetch("/board/"+id)
    .then(res=>res.json())
    .then(d=>{
        currentId=id;

        show(detailView);

        d_title.innerText=d.title;
        d_id.innerText=d.id;
        d_author.innerText=d.author;
        d_view.innerText=d.viewCount;
        d_content.innerText=d.content;
    });
}

/* 글쓰기 */
function showWrite(){
    if(!loginUser || loginUser==="GUEST"){
        alert("회원만 글쓰기 가능합니다");
        return;
    }

    show(writeView);

    editFlag=false;
    w_title.value="";
    w_content.value="";
}

/* 수정 */
function editMode(){
    fetch("/board/"+currentId)
    .then(res=>res.json())
    .then(d=>{
        showWrite();
        editFlag=true;
        w_title.value=d.title;
        w_content.value=d.content;
    });
}

/* 저장 */
function save(){
    if(editFlag){
        fetch("/board/"+currentId,{
            method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                title:w_title.value,
                content:w_content.value
            })
        }).then(()=>goMain());
    }else{
        fetch("/board",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                title:w_title.value,
                content:w_content.value
            })
        }).then(()=>goMain());
    }
}

/* 삭제 */
function deletePost(){
    fetch("/board/"+currentId,{method:"DELETE"})
    .then(()=>goMain());
}

/* 메인 */
function goMain(){
    show(mainView);
    load(page);
}

/* 시작 */
checkLogin();

</script>

</body>
</html>
