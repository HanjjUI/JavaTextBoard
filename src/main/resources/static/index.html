<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>게시판</title>
</head>
<body>

<h1>게시판</h1>

<input id="title" placeholder="제목">
<input id="content" placeholder="내용">
<button onclick="create()">글 작성</button>

<hr>

<ul id="list"></ul>

<script>
const API = "/board";

function load() {
    fetch(API)
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById("list");
            list.innerHTML = "";

            data.forEach(item => {
                const li = document.createElement("li");
                li.innerHTML = `
                    ${item.id} - ${item.title} - ${item.content}
                    <button onclick="remove(${item.id})">삭제</button>
                `;
                list.appendChild(li);
            });
        });
}

function create() {
    fetch(API, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            title: document.getElementById("title").value,
            content: document.getElementById("content").value
        })
    }).then(() => load());
}

function remove(id) {
    fetch(API + "/" + id, {
        method: "DELETE"
    }).then(() => load());
}

load();
</script>

</body>
</html>
